<!doctype html>
<html>
	<head>
		<title>Pitch Detector</title>
		<link href='http://fonts.googleapis.com/css?family=Alike' rel='stylesheet' type='text/css'>
		<link href="https://cdn.jsdelivr.net/npm/booststrap@5.3.2/dist/css/booststrap.min.css" rel="stylesheet">
		<script scr="https://jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

		<style>
			body { font: 14pt 'Alike', sans-serif;}
			#note { font-size: 164px; }
			.droptarget { background-color: #348781}
			div.confident { color: black; }
			div.vague { color: lightgrey; }
			#note { display: inline-block; height:180px; text-align: left;}
			
			#detector { width: 300px; height: 300px; border: 4px solid gray; border-radius: 8px; text-align: center; padding-top: 10px;}
			#output { width: 300px; height: 42px; }
			#flat { display: none; }
			#sharp { display: none; }
			.flat #flat { display: inline; }
			.sharp #sharp { display: inline; }
		</style>
	</head>
	<body>
		<h1>Tone ID</h1>
		<script src="js/pitchdetect.js"></script>
		
		<p><button onclick="startPitchDetect();">Start</button></p>
		<p>
			<button onclick="this.innerText = togglePlayback()">use demo audio</button>
			<button onclick="toggleLiveInput()">use live input</button>
			<button onclick="toggleOscillator()">use oscillator</button>
			<!--<button onclick="updatePitch(0);">sample</button>-->
		</p>

		<div id="detector" class="vague">
			<div class="pitch"><span id="pitch">--</span>Hz</div>
			<div class="note"><span id="note">--</span></div>   
			<canvas id="output" width=300 height=42></canvas>
			<div id="detune"><span id="detune_amt">--</span><span id="flat">cents &#9837;</span><span id="sharp">cents &#9839;</span></div>
		</div>

		<div id="last-note-display" style="text-align: start; margin: 10px 0; font-family: 'Alike', sans-serif; color: #348781;">
			Última nota: <span id="lastNote">--</span>
        </div>

		<div id="target-selector" style="width: 300px; border: 4px solid gray; border-radius: 8px; text-align: center; margin-top: 10px; padding: 10px;">
    <div style="font-size: 1.2em; margin-bottom: 5px;">Nota Alvo</div>
    <select id="selectNote" onchange="updateTargetHz()">
        <option value="0">C (Dó)</option>
        <option value="1">C#</option>
        <option value="2">D (Ré)</option>
        <option value="3">D#</option>
        <option value="4">E (Mi)</option>
        <option value="5">F (Fá)</option>
        <option value="6">F#</option>
        <option value="7">G (Sol)</option>
        <option value="8">G#</option>
        <option value="9">A (Lá)</option>
        <option value="10">A#</option>
        <option value="11">B (Si)</option>
    </select>
    <select id="selectOctave" onchange="updateTargetHz()">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
    </select>
    <div style="margin-top: 10px; font-weight: bold;">
        Frequência: <span id="targetHz">261.63</span> Hz
    </div>
</div>

		<!-- just used for debugging
		<canvas id="waveform" width="512" height="256"></canvas>
		-->

		<script type="text/javascript">

			var _gaq = _gaq || [];
			_gaq.push(['_setAccount', 'UA-35593052-1']);
			_gaq.push(['_trackPageview']);

			(function() {
				var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
				ga.src = ('https:' == document.location.protocol ? 'https://ssl' : 'http://www') + '.google-analytics.com/ga.js';
				var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
			})();
		</script>
	</body>
</html>
